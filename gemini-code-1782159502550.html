<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosteyezzzz - Verification</title>
    <style>
        body {
            background: black;
            color: #0aff9d;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #box {
            border: 2px solid #0aff9d;
            padding: 30px;
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 20px rgba(10,255,157,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .status-line { margin: 15px 0; font-size: 1.1rem; }
        .loading { animation: blink 1s infinite; }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="box">
        <h2>SECURITY CHECKPOINT</h2>
        <hr style="border-color: #0aff9d; margin: 15px 0;">
        <div id="status" class="status-line loading">Verifying Phantom Session...</div>
    </div>

    <script>
        // Inject Solana Web3 dynamically
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js';
        script.onload = verifyAndRoute;
        document.head.appendChild(script);

        const TOKEN_MINT = 'ELURv1srPxU12BCQc1NuPMUB2aCavtZHJtXtuNCtT2FC';

        async function verifyAndRoute() {
            const statusDiv = document.getElementById('status');
            
            if (!window.solana || !window.solana.isPhantom) {
                statusDiv.innerHTML = "❌ Phantom Wallet Required.";
                statusDiv.classList.remove('loading');
                return;
            }

            try {
                // Connect safely
                const response = await window.solana.connect({ onlyIfTrusted: true }).catch(() => window.solana.connect());
                const walletAddress = response.publicKey.toString();
                
                statusDiv.innerHTML = "🔍 Scanning Chain for ELUR Token...";

                // Establish high-speed Helius fallback connection
                const connection = new solanaWeb3.Connection(
                    'https://mainnet.helius-rpc.com/?api-key=30e46a74-d4b1-419b-9800-4e3ff9f91a92',
                    'confirmed'
                );

                const PublicKey = solanaWeb3.PublicKey;
                const TOKEN_PROGRAM_ID = new PublicKey('TokenkegQfeZyiNwAJsyFbPVwwQQfjarZaMS5dC76fy');
                
                const tokenAccounts = await connection.getParsedTokenAccountsByOwner(
                    new PublicKey(walletAddress),
                    { programId: TOKEN_PROGRAM_ID }
                );

                let hasToken = false;
                tokenAccounts.value.forEach(account => {
                    const mint = account.account.data.parsed.info.mint;
                    const balance = account.account.data.parsed.info.tokenAmount.uiAmount;
                    if (mint === TOKEN_MINT && balance > 0) {
                        hasToken = true;
                    }
                });

                if (hasToken) {
                    statusDiv.innerHTML = "✅ ACCESS GRANTED. Routing...";
                    setTimeout(() => {
                        window.location.href = "portal-space.html";
                    }, 800);
                } else {
                    statusDiv.innerHTML = "❌ Zero ELUR Balance. Access Denied.";
                    statusDiv.classList.remove('loading');
                }

            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = "⚠️ Network timeout. Bypassing safely...";
                setTimeout(() => { window.location.href = "portal-space.html"; }, 1200);
            }
        }
    </script>
</body>
</html>
