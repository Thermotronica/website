<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosteyezzzz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            font-family: monospace;
            color: #0aff9d;
            height: 100vh;
        }

        /* Cursed Matrix Title */
        #title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #0aff9d, 0 0 20px #0aff9d;
            animation: glitch 2s infinite;
            z-index: 10;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(3deg); }
            40% { transform: skew(-3deg); }
            60% { transform: skew(2deg); }
            80% { transform: skew(-2deg); }
            100% { transform: skew(0deg); }
        }

        /* Floating ghosteyezzzz images */
        .ghost {
            position: absolute;
            width: 260px;
            height: 260px;
            opacity: 0.7;
            animation: fade 6s infinite ease-in-out, invertCycle 6s infinite steps(2);
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(10, 255, 157, 0.3));
        }

        @keyframes fade {
            0% { opacity: 0; transform: scale(0.8); }
            25% { opacity: 1; transform: scale(1); }
            50% { opacity: 0; transform: scale(1.2); }
            75% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        @keyframes invertCycle {
            0% { filter: invert(0) drop-shadow(0 0 20px rgba(10, 255, 157, 0.3)); }
            50% { filter: invert(1) drop-shadow(0 0 20px rgba(10, 255, 157, 0.3)); }
            100% { filter: invert(0) drop-shadow(0 0 20px rgba(10, 255, 157, 0.3)); }
        }

        /* Bouncing Blu-ray style text */
        #bounceText {
            position: absolute;
            font-size: 2rem;
            color: #0aff9d;
            text-shadow: 0 0 10px #0aff9d;
            z-index: 20;
            white-space: nowrap;
        }

        /* Mini Terminal */
        #terminal {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #0aff9d;
            border-radius: 4px;
            padding: 15px;
            z-index: 30;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(10, 255, 157, 0.4), inset 0 0 10px rgba(10, 255, 157, 0.1);
            font-size: 0.85rem;
            line-height: 1.8;
            min-width: 320px;
        }

        .terminal-line {
            color: #0aff9d;
            margin: 4px 0;
            text-shadow: 0 0 5px rgba(10, 255, 157, 0.5);
        }

        .terminal-label {
            opacity: 0.6;
            display: inline-block;
            min-width: 100px;
        }

        .terminal-value {
            opacity: 1;
            font-weight: bold;
        }

        .terminal-success {
            color: #44ff44;
            text-shadow: 0 0 5px rgba(68, 255, 68, 0.5);
        }

        .terminal-loading {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        .terminal-button-group {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        #connectBtn, #buyBtn, #stopBtn {
            padding: 8px 12px;
            background: #0aff9d;
            color: black;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
            transition: all 0.3s;
            font-family: monospace;
            flex: 1;
        }

        #connectBtn:hover, #buyBtn:hover, #stopBtn:hover {
            background: #08cc7f;
            box-shadow: 0 0 10px rgba(10, 255, 157, 0.6);
        }

        #connectBtn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #stopBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }

        .divider {
            height: 1px;
            background: rgba(10, 255, 157, 0.2);
            margin: 8px 0;
        }

        @media (max-width: 600px) {
            #terminal {
                bottom: 60px;
                left: 10px;
                right: 10px;
                max-width: none;
                font-size: 0.75rem;
            }

            #stopBtn {
                bottom: 10px;
                right: 10px;
                padding: 8px 10px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div id="title">Ghosteyezzzz</div>

    <img src="IMG_3057.PNG" class="ghost" style="top:10%; left:20%; animation-delay:0s;" alt="Ghosteyezzzz graphic 1">
    <img src="IMG_3057.PNG" class="ghost" style="top:50%; left:60%; animation-delay:2s;" alt="Ghosteyezzzz graphic 2">
    <img src="IMG_3057.PNG" class="ghost" style="top:70%; left:30%; animation-delay:4s;" alt="Ghosteyezzzz graphic 3">
    <div id="bounceText">Ghosteyezzzz is for sleep and fun</div>

    <div id="terminal">
        <div class="terminal-line">
            <span class="terminal-label">> system</span>
            <span class="terminal-value">GATEWAY PASS v1.1</span>
        </div>
        
        <div id="terminalContent">
            <div class="terminal-line">
                <span class="terminal-label">> status</span>
                <span class="terminal-value">awaiting connection</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="terminal-button-group">
            <button id="connectBtn" type="button">🔗 Connect Wallet</button>
            <button id="buyBtn" type="button">💎 Buy ELUR</button>
        </div>
    </div>

    <button id="stopBtn" type="button">Stop Animations</button>

    <script>
        console.log('🔮 Ghosteyezzzz initializing direct access gateway...');

        const TOKEN_MINT = 'ELURv1srPxU12BCQc1NuPMUB2aCavtZHJtXtuNCtT2FC';
        const PHANTOM_TRADE_URL = `https://trade.phantom.com/token/${TOKEN_MINT}`;

        function updateTerminal(lines) {
            const content = document.getElementById('terminalContent');
            content.innerHTML = lines.map(line => {
                if (line.type === 'success') {
                    return `<div class="terminal-line"><span class="terminal-label">> ${line.label}</span> <span class="terminal-value terminal-success">${line.value}</span></div>`;
                } else if (line.type === 'loading') {
                    return `<div class="terminal-line"><span class="terminal-label">> ${line.label}</span> <span class="terminal-value terminal-loading">${line.value}</span></div>`;
                }
                return `<div class="terminal-line"><span class="terminal-label">> ${line.label}</span> <span class="terminal-value">${line.value}</span></div>`;
            }).join('');
        }

        function isPhantomInstalled() {
            return !!(window.solana && window.solana.isPhantom);
        }

        async function connectAndRedirect() {
            if (!isPhantomInstalled()) {
                window.open('https://phantom.app/', '_blank');
                return;
            }

            document.getElementById('connectBtn').disabled = true;
            updateTerminal([{ label: 'status', value: 'authorizing portal...', type: 'loading' }]);

            try {
                // Request authorization signature from user wallet 
                const response = await window.solana.connect();
                const walletAddress = response.publicKey.toString();

                // Save basic validation context locally 
                localStorage.setItem('connectedWallet', walletAddress);

                updateTerminal([
                    { label: 'access', value: 'GRANTED', type: 'success' },
                    { label: 'portal', value: 'opening...', type: 'loading' }
                ]);

                // Direct routing past network bottlenecks
                setTimeout(() => {
                    window.location.href = "gemini-code-1782159502550.html";
                }, 500);

            } catch (error) {
                console.log("Connection rejected or failed", error);
                updateTerminal([{ label: 'status', value: 'awaiting connection', type: 'normal' }]);
                document.getElementById('connectBtn').disabled = false;
            }
        }

        function buyTokens() {
            window.open(PHANTOM_TRADE_URL, '_blank');
        }

        function initializeApp() {
            document.getElementById('connectBtn').addEventListener('click', connectAndRedirect);
            document.getElementById('buyBtn').addEventListener('click', buyTokens);

            // Quick bypass check if already signed in earlier
            if (isPhantomInstalled() && localStorage.getItem('connectedWallet')) {
                window.location.href = "gemini-code-1782159502550.html";
            }
        }

        window.addEventListener('DOMContentLoaded', initializeApp);

        // Animations Loop (Fully isolated)
        const text = document.getElementById("bounceText");
        let x = 100, y = 100, dx = 2, dy = 2;
        let animating = true;

        function bounce() {
            if (!animating) return;
            const w = window.innerWidth, h = window.innerHeight;
            x += dx; y += dy;
            if (x <= 0 || x + text.clientWidth >= w) dx *= -1;
            if (y <= 0 || y + text.clientHeight >= h) dy *= -1;
            text.style.left = x + "px"; text.style.top = y + "px";
            requestAnimationFrame(bounce);
        }
        requestAnimationFrame(bounce);

        document.getElementById("stopBtn").addEventListener('click', () => {
            animating = false;
            document.querySelectorAll(".ghost").forEach(el => el.style.animation = "none");
            text.style.animation = "none";
            document.getElementById("stopBtn").innerHTML = "Animations Stopped ⏸";
        });
    </script>
</body>
</html>
